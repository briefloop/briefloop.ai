<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BriefLoop — 创建报告工作区（设计原型）</title>
    <!--
      DESIGN PROTOTYPE · NOT SHIPPED
      BriefLoop Interactive Init — UI/UX evaluation build.
      - No backend: the "setup service" is a mock seam in app.js.
      - Fixed public-safe synthetic preview content only.
      - Visual semantics follow BriefLoop Web Visual System v1 (draft):
        blue = action/info · purple = advisory (agent-origin) ·
        red = deterministic block · yellow = attention · gray = unavailable.
      Fork shape: PPT Master confirm_ui @ 619a954 (MIT), product seam replaced.
    -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-return-bar">
        <a href="/index.html#roadmap">← briefloop.ai</a>
        <span>设计预览 · NOT SHIPPED · 合成数据 / Design preview · synthetic data</span>
    </div>

    <div id="app">
        <aside id="preview-panel" aria-label="版式预览">
            <div class="brand-block">
                <div class="brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 32 32" width="18" height="18">
                        <rect width="32" height="32" rx="7" fill="#05351d"/>
                        <path d="M8.2 13a8.3 8.3 0 0 1 13.3-4.1M20 6.8l2.1 2.4-3.1.9M23.8 19a8.3 8.3 0 0 1-13.3 4.1M12 25.2l-2.1-2.4 3.1-.9" fill="none" stroke="#4faf62" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <rect x="13" y="13" width="6" height="6" rx="1.3" fill="none" stroke="#f2f5f1" stroke-width="1.6"/>
                        <path d="M14.5 16h3" stroke="#f2f5f1" stroke-width="1.4" stroke-linecap="round"/>
                    </svg>
                </div>
                <div>
                    <div class="panel-kicker">BriefLoop</div>
                    <div class="panel-title" data-i18n="panel_title">创建报告工作区</div>
                </div>
            </div>
            <div class="proto-banner" data-i18n="proto_banner">设计原型 · 未发布 · 预览为固定合成内容</div>
            <div id="topbar-preview"></div>
        </aside>

        <section id="control-panel">
            <header id="topbar">
                <div id="topbar-inner">
                    <nav id="stage-steps" aria-label="阶段">
                        <!-- steps injected by app.js -->
                    </nav>
                    <div class="lang-select">
                        <button id="btn-lang-toggle" class="lang-select-btn" type="button" title="Switch language" aria-haspopup="listbox" aria-expanded="false"><span id="lang-current">中文</span><span class="lang-caret" aria-hidden="true">▾</span></button>
                        <ul id="lang-menu" class="lang-menu" role="listbox" hidden>
                            <li role="option" tabindex="0" aria-selected="true" data-lang="zh">中文</li>
                            <li role="option" tabindex="0" aria-selected="false" data-lang="en">English</li>
                        </ul>
                    </div>
                </div>
            </header>

            <main id="form">
                <div id="sections"></div>
            </main>

            <footer id="actionbar">
                <span id="confirm-status" role="status"></span>
                <div class="actionbar-btns">
                    <button id="btn-back" class="btn-ghost" type="button" data-i18n="btn_back">← 上一步</button>
                    <button id="btn-next" class="btn-primary" type="button" data-i18n="btn_next">下一步 →</button>
                    <button id="btn-confirm" class="btn-primary" type="button" data-i18n="btn_confirm" hidden>创建报告工作区</button>
                </div>
            </footer>
        </section>
    </div>

    <div id="confirmed-overlay" hidden>
        <div class="cf-card" role="dialog" aria-modal="true" aria-labelledby="cf-title">
            <div id="cf-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
